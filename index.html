    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Chat Bot</title>
        <!-- link icon   -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
        <!-- link icon page  -->
        <link rel="icon" type="image/x-icon" href="images/gemini.svg">
        <!-- link style css  -->
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>


        <section>
            <div class="chat-container">

                <div class="header">
                    <h1>AI Chat Bot</h1>
                    <h2>Hello there I’m Sayed</h2>
                    <p>How can I help you today?</p>
                </div>

                <div class="chat_list">
                </div>

                <form action="#" class="typing_form">
                    <div class="input_wrapper">
                        <input   type="text" class="typing_input" placeholder="Enter a prompt here" required>
                        <button type="submit" class="material-symbols-outlined">send</button>
                    </div>
                </form>

            </div>
        </section>

        <!-- main js  -->
        <script src="js/main.js"></script>
    </body>

    </html>
